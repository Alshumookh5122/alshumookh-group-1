services:
  - type: web
    name: alshumookh-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
  - type: worker
    name: alshumookh-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A worker.celery_app worker -l info
