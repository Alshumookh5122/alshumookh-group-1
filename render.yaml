services:
  - type: web
    name: alshumookh-api
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.app.main:app --host 0.0.0.0 --port $PORT --workers 4
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alshumookh-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: alshumookh-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: alshumookh-worker
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: celery -A worker.celery_app worker --loglevel=info --concurrency=4
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: alshumookh-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: alshumookh-redis
          type: redis
          property: connectionString

  - type: redis
    name: alshumookh-redis
    region: oregon
    plan: starter
    maxmemoryPolicy: noeviction

databases:
  - name: alshumookh-db
    databaseName: alshumookh
    region: oregon
    plan: standard
