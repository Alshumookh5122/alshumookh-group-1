<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Payment — Alshumookh</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');
:root{--bg:#0a0a0f;--surface:#111118;--surface2:#1a1a26;--border:#2a2a40;--gold:#c9a84c;--teal:#2dd4bf;--red:#f87171;--green:#4ade80;--text:#e8e6f0;--muted:#6b6888}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:3rem 1rem}
.container{width:520px;max-width:100%}.logo{font-size:.9rem;font-weight:800;letter-spacing:.1em;color:var(--gold);margin-bottom:2rem;display:flex;align-items:center;gap:.5rem}
h1{font-size:1.8rem;font-weight:800;margin-bottom:.4rem}.subtitle{color:var(--muted);font-size:.9rem;margin-bottom:2.5rem}
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:.5rem;margin-bottom:2rem}
.type-btn{padding:1rem;border-radius:12px;border:2px solid var(--border);background:var(--surface);cursor:pointer;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:.4rem;font-family:'Syne',sans-serif}
.type-btn:hover{border-color:var(--gold-dim)}.type-btn.active{border-color:var(--gold);background:var(--surface2)}
.type-icon{font-size:1.8rem}.type-label{font-size:.82rem;font-weight:700}.type-desc{font-size:.7rem;color:var(--muted);font-weight:400}
.field{margin-bottom:1.5rem}label{display:block;font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
input,select,textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'DM Mono',monospace;font-size:.9rem;padding:.8rem 1rem;border-radius:8px;outline:none;transition:border-color .15s;-webkit-appearance:none}
select{font-family:'Syne',sans-serif}input:focus,select:focus{border-color:var(--gold)}input::placeholder{color:var(--muted)}
.amount-wrap{position:relative}.amount-wrap input{padding-left:2.5rem}.currency-prefix{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--muted);font-family:'DM Mono',monospace;font-size:.9rem;pointer-events:none}
.token-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:.5rem}
.token-btn{padding:.6rem .2rem;border:2px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;text-align:center;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:.2rem}
.token-btn:hover{border-color:var(--teal)}.token-btn.active{border-color:var(--teal);background:var(--surface2);color:var(--teal)}.token-symbol{font-size:.65rem;color:var(--muted)}
.submit-btn{width:100%;padding:1rem;border-radius:10px;border:none;background:linear-gradient(135deg,var(--gold),#e0a82e);color:#000;font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;margin-top:.5rem;letter-spacing:.02em}
.submit-btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(201,168,76,.3)}.submit-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.result-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2rem;margin-top:1.5rem;display:none}.result-card.show{display:block}
.result-title{font-size:1rem;font-weight:800;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.info-row{display:flex;justify-content:space-between;padding:.6rem 0;border-bottom:1px solid var(--border);font-size:.82rem}.info-row:last-of-type{border-bottom:none}
.info-label{color:var(--muted);font-weight:600}.info-value{font-family:'DM Mono',monospace;font-size:.79rem}
.address-display{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:1rem;margin:1rem 0}
.addr-text{font-family:'DM Mono',monospace;font-size:.78rem;color:var(--teal);word-break:break-all}
.copy-row{display:flex;justify-content:flex-end;margin-top:.4rem}.copy-link{font-size:.72rem;color:var(--muted);cursor:pointer}.copy-link:hover{color:var(--gold)}
.alert{border-radius:8px;padding:.8rem 1rem;font-size:.82rem;margin-bottom:1.2rem;display:none}.alert.show{display:block}
.alert-error{background:#450a0a;color:var(--red);border:1px solid #7f1d1d}.alert-info{background:#1e3a5f20;color:#60a5fa;border:1px solid #1e3a5f}
.status-link{display:block;text-align:center;margin-top:1rem;color:var(--gold);font-size:.84rem;font-weight:700;text-decoration:none}.status-link:hover{text-decoration:underline}
.seg{display:flex;gap:.5rem;margin-bottom:1.5rem;background:var(--surface2);padding:.3rem;border-radius:8px}
.seg-btn{flex:1;padding:.5rem;border:none;background:transparent;color:var(--muted);font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;border-radius:6px;transition:all .15s}.seg-btn.active{background:var(--surface);color:var(--text)}
</style>
</head>
<body>
<div class="container">
  <div class="logo">◈ Alshumookh</div><h1>Create Payment</h1><p class="subtitle">Generate a new payment link or deposit address</p>
  <div id="alert" class="alert alert-error"></div>
  <div class="seg"><button class="seg-btn active" onclick="setAuthMode('token')">API Token</button><button class="seg-btn" onclick="setAuthMode('login')">Email/Password</button></div>
  <div id="auth-token" class="field"><label>Bearer Token</label><input type="text" id="bearer-token" placeholder="Paste your access token…" /></div>
  <div id="auth-login" style="display:none"><div class="field"><label>Email</label><input type="text" id="auth-email" /></div><div class="field"><label>Password</label><input type="password" id="auth-password" /></div><button class="submit-btn" style="margin-bottom:1.5rem;background:var(--surface2);color:var(--text);border:1px solid var(--border)" onclick="doAuthLogin()">Sign In</button></div>
  <div class="type-toggle"><div class="type-btn active" id="btn-crypto" onclick="setType('crypto')"><div class="type-icon">₿</div><div class="type-label">Crypto</div><div class="type-desc">ETH, USDT, USDC…</div></div><div class="type-btn" id="btn-fiat" onclick="setType('fiat')"><div class="type-icon">💳</div><div class="type-label">Fiat</div><div class="type-desc">Card via Stripe</div></div></div>
  <div class="field"><label>Amount</label><div class="amount-wrap"><span class="currency-prefix" id="currency-prefix">Ξ</span><input type="number" id="amount" placeholder="0.00" min="0.000001" step="any" /></div></div>
  <div id="crypto-fields"><div class="field"><label>Token</label><div class="token-grid"><div class="token-btn active" onclick="setToken('ETH')"><div>Ξ</div><div class="token-symbol">ETH</div></div><div class="token-btn" onclick="setToken('USDT')"><div>₮</div><div class="token-symbol">USDT</div></div><div class="token-btn" onclick="setToken('USDC')"><div>$</div><div class="token-symbol">USDC</div></div><div class="token-btn" onclick="setToken('DAI')"><div>◈</div><div class="token-symbol">DAI</div></div><div class="token-btn" onclick="setToken('MATIC')"><div>⬡</div><div class="token-symbol">MATIC</div></div></div></div></div>
  <div id="fiat-fields" style="display:none"><div class="field"><label>Currency</label><select id="fiat-currency"><option value="usd">USD — US Dollar</option><option value="eur">EUR — Euro</option><option value="gbp">GBP — British Pound</option><option value="aed">AED — UAE Dirham</option></select></div></div>
  <div class="field"><label>Description (optional)</label><input type="text" id="description" placeholder="e.g. Order #1234" /></div>
  <div class="field"><label>Callback URL (optional)</label><input type="text" id="callback-url" placeholder="https://yoursite.com/payment-webhook" /></div>
  <button class="submit-btn" id="submit-btn" onclick="createPayment()">Create Payment →</button>
  <div class="result-card" id="result-card"><div class="result-title">✓ Payment Created</div><div id="result-content"></div><a id="status-link" class="status-link" href="#">View Payment Status →</a></div>
</div>
<script>
let paymentType='crypto',selectedToken='ETH',authToken=localStorage.getItem('als_token')||'';
document.getElementById('bearer-token').value=authToken;
function setAuthMode(m){document.querySelectorAll('.seg-btn').forEach((b,i)=>b.classList.toggle('active',(m==='token'?0:1)===i));document.getElementById('auth-token').style.display=m==='token'?'block':'none';document.getElementById('auth-login').style.display=m==='login'?'block':'none'}
async function doAuthLogin(){const e=document.getElementById('auth-email').value,p=document.getElementById('auth-password').value;showAlert('');try{const r=await fetch('/api/v1/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email:e,password:p})});const d=await r.json();if(!r.ok){showAlert(d.detail||'Login failed');return}authToken=d.access_token;localStorage.setItem('als_token',authToken);document.getElementById('bearer-token').value=authToken;setAuthMode('token');showAlert('Signed in successfully!','info')}catch(x){showAlert('Connection error')}}
function setType(t){paymentType=t;document.getElementById('btn-crypto').classList.toggle('active',t==='crypto');document.getElementById('btn-fiat').classList.toggle('active',t==='fiat');document.getElementById('crypto-fields').style.display=t==='crypto'?'block':'none';document.getElementById('fiat-fields').style.display=t==='fiat'?'block':'none';document.getElementById('currency-prefix').textContent=t==='fiat'?'$':'Ξ'}
function setToken(t){selectedToken=t;document.querySelectorAll('.token-btn').forEach(b=>b.classList.toggle('active',b.querySelector('.token-symbol')?.textContent===t));const p={ETH:'Ξ',USDT:'₮',USDC:'$',DAI:'◈',MATIC:'⬡'};document.getElementById('currency-prefix').textContent=p[t]||t[0]}
function showAlert(m,t='error'){const e=document.getElementById('alert');e.textContent=m;e.className=`alert alert-${t}`+(m?' show':'')}
async function createPayment(){const t=document.getElementById('bearer-token').value.trim()||authToken;if(!t){showAlert('Please provide a Bearer token or sign in.');return}const a=parseFloat(document.getElementById('amount').value);if(!a||a<=0){showAlert('Please enter a valid amount.');return}const b=document.getElementById('submit-btn');b.disabled=true;b.textContent='Creating…';showAlert('');const pl={amount:a,currency:paymentType==='crypto'?selectedToken:document.getElementById('fiat-currency').value.toUpperCase(),payment_type:paymentType,token_symbol:paymentType==='crypto'?selectedToken:undefined,description:document.getElementById('description').value||undefined,callback_url:document.getElementById('callback-url').value||undefined};try{const r=await fetch('/api/v1/payments/',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify(pl)});const d=await r.json();if(!r.ok){showAlert(d.detail||JSON.stringify(d));return}renderResult(d)}catch(e){showAlert('Network error: '+e.message)}finally{b.disabled=false;b.textContent='Create Payment →'}}
function renderResult(p){const c=document.getElementById('result-card'),ct=document.getElementById('result-content');c.classList.add('show');let h=`<div class="info-row"><span class="info-label">Reference</span><span class="info-value" style="color:var(--gold)">${p.reference}</span></div><div class="info-row"><span class="info-label">Amount</span><span class="info-value">${p.amount} ${p.currency}</span></div><div class="info-row"><span class="info-label">Type</span><span class="info-value">${p.payment_type}</span></div><div class="info-row"><span class="info-label">Status</span><span class="info-value">${p.status}</span></div>`;if(p.deposit_address){h+=`<div class="address-display"><div style="font-size:.72rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem">Deposit Address</div><div class="addr-text" id="result-addr">${p.deposit_address}</div><div class="copy-row"><span class="copy-link" onclick="navigator.clipboard.writeText(document.getElementById('result-addr').textContent)">📋 Copy</span></div></div>`}if(p.expires_at){h+=`<div class="info-row"><span class="info-label">Expires</span><span class="info-value">${new Date(p.expires_at).toLocaleString()}</span></div>`}ct.innerHTML=h;document.getElementById('status-link').href=`/static/payment-status.html?id=${p.id}`;c.scrollIntoView({behavior:'smooth'})}
</script>
</body></html>
